

name: Publish Docker Image
run-name: ${{ github.repository }} is building and publishing a docker image
on:
  release:
    types: [ published ]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment_tag:
        description: 'Additional environment tag (dev, staging, rc, stable)'
        required: false
        type: choice
        options:
          - 'none'
          - 'dev'
          - 'staging'
          - 'rc'
          - 'stable'
        default: 'none'
      version_tag:
        description: 'Optional version tag to add to the image (e.g., 2.2.0)'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || 'main' }} # var to determine the correct tag in normal pull request merge when no version is set

# Github documentation
jobs:
  build-and-publish-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # https://docs.github.com/actions/use-cases-and-examples/building-and-testing/building-and-testing-java-with-maven
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build with Maven
        run: mvn --batch-mode clean generate-resources install

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable latest tag
          flavor: |
            latest=false
          # Additional tags (branch / release tag / commit SHA / environment tags)
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.environment_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.environment_tag != 'none' }}
            type=raw,value=${{ inputs.version_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version_tag != '' }}
      - name: Build and push docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: SOURCE_IMAGE=eclipse-temurin:21-jre-ubi9-minimal
          file: Dockerfile

      # EIDOMNI-834 spike: build & push the hardened dhi.io variant with -dhi suffix
      # so it can be pulled side-by-side with the default UBI image for evaluation.
      - name: Extract metadata (dhi)
        id: meta-dhi
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-dhi
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.environment_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.environment_tag != 'none' }}
            type=raw,value=${{ inputs.version_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version_tag != '' }}

      - name: Build and push dhi (Hardened) docker image
        id: push-dhi
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: ${{ steps.meta-dhi.outputs.tags }}
          labels: ${{ steps.meta-dhi.outputs.labels }}
          file: Dockerfile.dhi

      - name: Monitor Snyk for vulnerabilities in code 📦
        uses: snyk/actions/maven-3-jdk-21@master
        env:
          JAVA_HOME: '' # Snyk action sets JAVA_HOME to a path that is not compatible with the setup-java action, so we need to reset it here
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          command: monitor
          args: --maven-aggregate-project --severity-threshold=high --project-tags:app-name=swiyu-verifier,version=${{ env.IMAGE_VERSION_TAG  }} --target-reference=${{ github.ref_name }}
      - name: Monitor Snyk for vulnerabilities in image 🐳
        uses: snyk/actions/docker@master
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          command: monitor
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION_TAG }}
          args: --severity-threshold=high --severity-threshold=high --project-tags:app-name=swiyu-verifier,version=${{ env.IMAGE_VERSION_TAG }} --target-reference=${{ github.ref_name }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}

      # EIDOMNI-834 spike: Snyk monitor for the hardened dhi.io image.
      - name: Monitor Snyk for vulnerabilities in dhi image 🐳
        uses: snyk/actions/docker@master
        continue-on-error: true # spike: do not fail the publish job if hardening surfaces new findings
        with:
          command: monitor
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION_TAG }}-dhi
          args: --severity-threshold=high --project-tags:app-name=swiyu-verifier,version=${{ env.IMAGE_VERSION_TAG }}-dhi --target-reference=${{ github.ref_name }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
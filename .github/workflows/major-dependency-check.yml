# ─────────────────────────────────────────────────────────────────────────────
# Monthly Major Dependency Check
#
# Dependabot only supports one config per ecosystem+directory and therefore
# cannot schedule major updates separately. This workflow fills that gap:
#
#   • Runs on the 1st of every month (and on demand).
#   • Uses the Maven versions plugin to list dependencies with a newer MAJOR.
#   • Opens (or refreshes) a single tracking issue labeled "major-upgrade"
#     containing a checklist of all candidates for manual review.
#
# Major updates remain a human decision – this workflow only surfaces them.
# ─────────────────────────────────────────────────────────────────────────────
name: Monthly Major Dependency Check

on:
  schedule:
    # 06:00 UTC on the 1st of every month
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Detect major-version updates
        id: scan
        run: |
          set -euo pipefail
          # rule: only report when major (segment 1) increased
          ./mvnw -B -q versions:display-dependency-updates \
            -DprocessDependencyManagement=true \
            -DallowMinorUpdates=false \
            -DallowIncrementalUpdates=false \
            | tee versions.log

          # Extract lines like "  groupId:artifactId ............ 1.2.3 -> 2.0.0"
          grep -E '\->' versions.log \
            | sed -E 's/^\s*\[INFO\]\s*//' \
            | sed -E 's/\s+\.+\s+/ /' \
            | sort -u > major-updates.txt || true

          if [ -s major-updates.txt ]; then
            {
              echo "found=true"
              echo "body<<EOF"
              echo "Automated monthly scan found dependencies with a new **major** version available."
              echo ""
              echo "Review each entry, evaluate breaking changes, and update \`pom.xml\` manually if appropriate."
              echo ""
              echo "## Candidates"
              while IFS= read -r line; do
                echo "- [ ] \`$line\`"
              done < major-updates.txt
              echo ""
              echo "_Generated by \`.github/workflows/major-dependency-check.yml\`_"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update tracking issue
        if: steps.scan.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ steps.scan.outputs.body }}
        with:
          script: |
            const title = `Major dependency updates available (${new Date().toISOString().slice(0,7)})`;
            const body  = process.env.ISSUE_BODY;
            const labels = ['dependencies', 'major-upgrade'];

            // Close any older open major-upgrade issue first
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: labels.join(','),
            });
            for (const issue of openIssues) {
              if (issue.title.startsWith('Major dependency updates available')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
              }
            }

            // Create a fresh issue for this month
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              labels,
            });


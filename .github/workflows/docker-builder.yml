

name: Publish Docker Image
run-name: ${{ github.repository }} is building and publishing a docker image
on:
  release:
    types: [ published ]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment_tag:
        description: 'Additional environment tag (dev, staging, rc, stable)'
        required: false
        type: choice
        options:
          - 'none'
          - 'dev'
          - 'staging'
          - 'rc'
          - 'stable'
        default: 'none'
      version_tag:
        description: 'Optional version tag to add to the image (e.g., 2.2.0)'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_VERSION_TAG: ${{ github.event_name == 'release' && github.ref_name || (github.event_name == 'workflow_dispatch' && inputs.version_tag || 'main') }} # var to determine the correct tag in normal pull request merge when no version is set

# Github documentation
jobs:
  build-and-publish-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        # https://docs.github.com/actions/use-cases-and-examples/building-and-testing/building-and-testing-java-with-maven
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Cache PGP keys for pgpverify-maven-plugin
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/pgpkeys-cache
          key: pgp-keys-${{ hashFiles('pgp/keys.list') }}
          restore-keys: pgp-keys-
      - name: Build with Maven
        run: mvn --batch-mode clean generate-resources install

      - name: Login to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # During the dual-image transition period we publish two variants:
      #   - Default (unsuffixed):  hardened dhi.io image, no shell, nonroot user.
      #     ghcr.io/.../swiyu-verifier:<tag>
      #   - `-unhardened` suffix:  UBI-based image, shell + entrypoint.sh wrapper.
      #     ghcr.io/.../swiyu-verifier:<tag>-unhardened
      # Operators who cannot migrate to the hardened image yet must pin to the
      # `-unhardened` suffix until they have completed the migration. The
      # unhardened variant will be removed in a later release.

      - name: Extract metadata (hardened, default)
        id: meta-dhi
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable latest tag
          flavor: |
            latest=false
          # Additional tags (branch / release tag / commit SHA / environment tags)
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.environment_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.environment_tag != 'none' }}
            type=raw,value=${{ inputs.version_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version_tag != '' }}
      - name: Build and push hardened (default) docker image
        id: push-dhi
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          provenance: mode=max
          sbom: true
          push: true
          pull: true
          tags: ${{ steps.meta-dhi.outputs.tags }}
          labels: ${{ steps.meta-dhi.outputs.labels }}
          file: Dockerfile.dhi

      - name: Extract metadata (unhardened)
        id: meta-unhardened
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-unhardened
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.environment_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.environment_tag != 'none' }}
            type=raw,value=${{ inputs.version_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version_tag != '' }}
      - name: Build and push unhardened docker image
        id: push-unhardened
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          provenance: mode=max
          sbom: true
          push: true
          pull: true
          tags: ${{ steps.meta-unhardened.outputs.tags }}
          labels: ${{ steps.meta-unhardened.outputs.labels }}
          build-args: SOURCE_IMAGE=eclipse-temurin:21-jre-ubi9-minimal
          file: Dockerfile

      # Install Cosign to sign the published images (see signing step below).
      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # Keyless signing with the workflow's OIDC identity (no long-lived keys).
      # Both variants are signed by their immutable digest, so every tag that
      # points to a signed digest (including tags produced by the retag workflow)
      # inherits a valid signature.
      - name: Sign published images with Cosign
        env:
          COSIGN_YES: "true"
          HARDENED_DIGEST: ${{ steps.push-dhi.outputs.digest }}
          UNHARDENED_DIGEST: ${{ steps.push-unhardened.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          echo "Signing hardened image ${IMAGE}@${HARDENED_DIGEST}"
          cosign sign --recursive "${IMAGE}@${HARDENED_DIGEST}"
          echo "Signing unhardened image ${IMAGE}@${UNHARDENED_DIGEST}"
          cosign sign --recursive "${IMAGE}@${UNHARDENED_DIGEST}"

      - name: Monitor Snyk for vulnerabilities in code 📦
        uses: snyk/actions/maven-3-jdk-21@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          JAVA_HOME: '' # Snyk action sets JAVA_HOME to a path that is not compatible with the setup-java action, so we need to reset it here
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          command: monitor
          args: --maven-aggregate-project --severity-threshold=high --project-tags:app-name=swiyu-verifier,version=${{ env.IMAGE_VERSION_TAG  }} --target-reference=${{ github.ref_name }}

      # Image variants are tracked as distinct Snyk projects so findings don't merge.
      - name: Monitor Snyk for vulnerabilities in hardened image 🐳
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          command: monitor
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION_TAG }}
          # Fixed: removed a duplicated `--severity-threshold=high` flag.
          args: --project-name=swiyu-verifier --project-tags:app-name=swiyu-verifier,version=${{ env.IMAGE_VERSION_TAG }} --target-reference=${{ github.ref_name }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}

      - name: Monitor Snyk for vulnerabilities in unhardened image 🐳
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          command: monitor
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION_TAG }}-unhardened
          args: --severity-threshold=high --project-name=swiyu-verifier-unhardened --project-tags:app-name=swiyu-verifier-unhardened,version=${{ env.IMAGE_VERSION_TAG }}-unhardened --target-reference=${{ github.ref_name }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
      - name: Create SBOM
        uses: snyk/actions/maven-3-jdk-21@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          command: sbom
          args: --format=cyclonedx1.6+json --maven-aggregate-project --json-file-output=sbom.json
        env:
          JAVA_HOME: '' # Snyk action sets JAVA_HOME to a path that is not compatible with the setup-java action, so we need to reset it here
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}

      - name: Upload SBOM to release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
          "${{ env.IMAGE_VERSION_TAG }}" \
          sbom.json
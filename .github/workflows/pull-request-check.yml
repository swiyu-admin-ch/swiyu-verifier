name: Pull Request Check
run-name: ${{ github.repository }} is evaluating pull request
on: [pull_request]

# Least privilege: this job builds/loads a local image (no push) and uploads SARIF,
# writes the coverage summary to the job summary, and does not publish packages or create attestations.
# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this job builds/loads a local image (no push) and uploads SARIF,
# writes the coverage summary to the job summary, and does not publish packages or create attestations.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  docker-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: java
          config-file: ./.github/codeql/codeql-config.yml
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Cache PGP keys for pgpverify-maven-plugin
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.m2/repository/pgpkeys-cache
          key: pgp-keys-${{ hashFiles('pgp/keys.list') }}
          restore-keys: pgp-keys-
      - name: Build & test with Maven (produce JaCoCo)
        run: mvn --batch-mode clean verify -DskipTests=false
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:java"
      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-reports
          path: |
            verifier-service/target/site/jacoco/jacoco.xml
            verifier-service/target/site/jacoco/index.html
            verifier-application/target/site/jacoco/jacoco.xml
            verifier-application/target/site/jacoco/index.html

      - name: Setup Node.js (for coverage summary script)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Add coverage to summary
        run: node .github/scripts/coverage-summary.js

      - name: Run PMD static analysis
        uses: pmd/pmd-github-action@d9c1f3c5940cbf5923f1354e83fa858b4496ebaa # v2
        id: pmd
        with:
          rulesets: '.github/rulesets/java/pmd_omni_ruleset.xml'
          cache: true

      - name: Upload PMD SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: pmd-report.sarif

      - name: Run Snyk to check for vulnerabilities 🔍
        uses: snyk/actions/maven-3-jdk-21@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: false
        env:
          JAVA_HOME: '' # Snyk action sets JAVA_HOME to a path that is not compatible with the setup-java action, so we need to reset it here
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          args: --maven-aggregate-project --severity-threshold=high --sarif-file-output=snyk.sarif
      - name: Upload result as sarif to GitHub Code Scanning 📦
        if: always() # We want to upload the SARIF file even if the Snyk action fails, to have the results in the Code Scanning tab of GitHub
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: snyk.sarif

      # Build and scan both image variants on every PR so a regression
      # in either Dockerfile is caught before merge. The hardened dhi.io image is
      # the default published variant; the UBI image is published under -unhardened
      # during the transition period. Both must succeed for the PR to be mergeable.

      - name: Build hardened (default) docker image
        id: build-dhi
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # 10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          pull: true # Prevent old images to be used, which may trigger CVE findings
          tags: pull_request_check:latest
          file: Dockerfile.dhi

      - name: Scan hardened Docker image with Snyk 🐳
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: false
        with:
          # report only vulnerabilities with level high or critical, as we want to avoid noise in the PR checks
          image: pull_request_check:latest
          args: --file=Dockerfile.dhi --severity-threshold=high --exclude-base-image-vulns
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}

      - name: Build unhardened docker image
        id: build-unhardened
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true
          tags: pull_request_check:unhardened
          build-args: SOURCE_IMAGE=eclipse-temurin:21-jre-ubi9-minimal
          file: Dockerfile

      - name: Scan unhardened Docker image with Snyk 🐳
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: false
        with:
          image: pull_request_check:unhardened
          args: --file=Dockerfile --severity-threshold=high --exclude-base-image-vulns
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.eu.snyk.io
          SNYK_ORG: ${{ secrets.SNYK_ORG }}

      - name: Generate OpenAPI spec
        run: mvn -B clean verify -P generate-doc -DskipTests
#      - name: Ensure spec is committed
#        run: |
#          git diff --exit-code -- openapi.yaml || (
#            echo "openapi.yaml is outdated. Run: mvn verify -P generate-doc and commit the updated file."
#            exit 1
#          )

  ai-code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # We need permissions to leave a comment on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: 0 fetches the full git history, which is required for the diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: pip install langgraph langchain-openai pydantic

      - name: Run AI Review Agent
        env:
          ADESSO_API_KEY: ${{ secrets.ADESSO_API_KEY }}
          # These variables can be defined directly here
          ADESSO_BASE_URL: "https://adesso-ai-hub.3asabc.de/v1"
          LLM_MODEL_NAME: "google/gemma-3-27b-it"
          # Tells the script which branch the PR targets (e.g. origin/main)
          GIT_DIFF_TARGET: "origin/${{ github.base_ref }}...HEAD"
        run: |
          # Run the script
          python .github/agent/ai-review-agent/review_agent_openai.py

      - name: Add Report to Job Summary
        # Shows the result on the GitHub Actions summary page
        if: always()
        run: |
          if [ -f ai-review-report.md ]; then
            cat ai-review-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post Report as PR Comment
        # Posts the result directly as a comment on the pull request
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f ai-review-report.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file ai-review-report.md
          fi
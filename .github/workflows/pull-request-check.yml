# Inspired by https://thomasthornton.cloud/2025/03/18/setting-up-trivy-in-your-github-actions/
name: Pull Request Check
run-name: ${{ github.repository }} is evaluating pull request
on: [pull_request]

permissions:
  actions: read
  security-events: write
  contents: read
  packages: write
  attestations: write
  id-token: write
  pull-requests: write  # allow coverage comment

jobs:
  docker-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          config-file: ./.github/codeql/codeql-config.yml
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build & test with Maven (produce JaCoCo)
        run: mvn --batch-mode clean verify -DskipTests=false
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            verifier-service/target/site/jacoco/jacoco.xml
            verifier-service/target/site/jacoco/index.html
            verifier-application/target/site/jacoco/jacoco.xml
            verifier-application/target/site/jacoco/index.html

      - name: Setup Node.js (for coverage summary script)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Add coverage to summary
        run: node .github/scripts/coverage-summary.js

      - name: Run PMD static analysis
        uses: pmd/pmd-github-action@v2
        id: pmd
        with:
          rulesets: '.github/rulesets/java/pmd_omni_ruleset.xml'

      - name: Upload PMD SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pmd-report.sarif

      - name: Build and push docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true # Prevent old images to be used, which may trigger CVE findings
          tags: pull_request_check:latest
          build-args: SOURCE_IMAGE=eclipse-temurin:21-jre-ubi9-minimal
          file: Dockerfile

      - name: Run Trivy image scan
        id: trivy_scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: pull_request_check:latest
          severity: 'CRITICAL,HIGH'
          exit-code: 0 # Trivy darf nicht den Job abbrechen, damit SARIF immer hochgeladen wird
          ignore-unfixed: false
          format: sarif
          output: trivy-image.sarif

      - name: Upload Trivy SARIF
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

      - name: Prepare Trivy gate artifact
        if: ${{ always() }}
        run: |
          mkdir -p trivy-gate
          if [ -f trivy-image.sarif ]; then
            cp trivy-image.sarif trivy-gate/trivy-image.sarif
          fi
          cat > trivy-gate/scan-status.json <<EOF
          {"trivyStepOutcome":"${{ steps.trivy_scan.outcome }}","sarifPresent":$( [ -f trivy-image.sarif ] && echo true || echo false )}
          EOF

      - name: Upload Trivy gate artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-gate
          path: trivy-gate/

  trivy-security-gate:
    needs: docker-security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Trivy gate artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-gate

      - name: Check Trivy SARIF for vulnerabilities
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const statusFile = 'scan-status.json';
          if (!fs.existsSync(statusFile)) {
            console.error('Missing scan-status.json from the docker-security-scan job.');
            process.exit(1);
          }

          const status = JSON.parse(fs.readFileSync(statusFile, 'utf8'));
          if (!status.sarifPresent) {
            console.error('Trivy did not produce trivy-image.sarif.');
            console.error(`Trivy step outcome: ${status.trivyStepOutcome}`);
            console.error('Check the docker-security-scan job logs above for the root cause.');
            process.exit(1);
          }

          const sarifFile = 'trivy-image.sarif';
          const sarif = JSON.parse(fs.readFileSync(sarifFile, 'utf8'));
          const count = (sarif.runs ?? [])
            .flatMap(run => run.results ?? [])
            .length;

          if (count > 0) {
            console.error(`Trivy found ${count} vulnerabilities.`);
            process.exit(1);
          }

          console.log('No vulnerabilities found by Trivy.');
          EOF

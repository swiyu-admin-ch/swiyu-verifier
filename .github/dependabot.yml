# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file


# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "maven"
    # Use the Maven multi-module root only; Dependabot scans child pom.xml files recursively.
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Spring ecosystem updates (Boot/Framework/Cloud/Statemachine/SpringDoc + embedded servers).
      # Keep major updates separate for manual review of potentially breaking framework changes.
      spring:
        patterns:
          - "org.springframework*"
          - "org.springdoc*"
          - "org.apache.tomcat.embed*"
          - "org.eclipse.jetty*"
          - "io.undertow*"
        update-types:
          - "patch"
          - "minor"

      # Internal SWIYU libraries and modules (both published libs and project-internal artifacts).
      swiyu:
        patterns:
          - "ch.admin*"
          - "io.github.swiyu*"

      # Security-relevant crypto/JWT stack, isolated for dedicated review.
      cryptography:
        patterns:
          - "com.nimbusds*"
          - "org.bouncycastle*"
          - "com.authlete*"
          - "io.jsonwebtoken*"

      # Runtime infrastructure: database, ORM/migrations, networking, logging, observability.
      infrastructure:
        patterns:
          - "org.postgresql*"
          - "com.mysql*"
          - "org.mariadb.jdbc*"
          - "org.hibernate*"
          - "org.flywaydb*"
          - "org.liquibase*"
          - "io.netty*"
          - "com.squareup.okhttp3*"
          - "com.squareup.okio*"
          - "ch.qos.logback*"
          - "org.apache.logging.log4j*"
          - "net.logstash.logback*"
          - "io.micrometer*"
          - "io.prometheus*"
          - "io.zipkin.brave*"

      # Everything else (tests, build tooling, processors, caching, scheduling, utilities, helpers).
      # "*" ensures no Maven dependency or plugin update remains ungrouped.
      tooling:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
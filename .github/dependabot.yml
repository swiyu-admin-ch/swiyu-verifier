# Dependabot version update configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Update strategy:
#   • Weekly patch + minor updates are automated via Dependabot (label: patch-minor).
#   • Major updates are intentionally excluded here and must be applied manually,
#     because they carry breaking-change risk and require deliberate review.

version: 2
updates:

  # ════════════════════════════════════════════════════════════════════════════
  # Maven – Weekly: patch + minor only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "patch-minor"
    commit-message:
      prefix: "chore(deps)"
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "org.springdoc*"
          - "org.apache.tomcat.embed*"
          - "org.eclipse.jetty*"
          - "io.undertow*"
        update-types: ["patch", "minor"]

      # Internal swiyu / Swiss e-ID libraries – all update types (no major-version risk gate)
      swiyu:
        patterns:
          - "ch.admin*"
          - "io.github.swiyu*"

      cryptography:
        # Auth/encryption libs – silent API breaks possible; kept in their own PR
        patterns:
          - "com.nimbusds*"
          - "org.bouncycastle*"
          - "com.authlete*"
          - "io.jsonwebtoken*"
        update-types: ["patch", "minor"]

      infrastructure:
        # DB drivers, migrations, networking, observability
        patterns:
          - "org.postgresql*"
          - "com.mysql*"
          - "org.mariadb.jdbc*"
          - "org.hibernate*"
          - "org.flywaydb*"
          - "org.liquibase*"
          - "io.netty*"
          - "com.squareup.okhttp3*"
          - "com.squareup.okio*"
          - "ch.qos.logback*"
          - "org.apache.logging.log4j*"
          - "net.logstash.logback*"
          - "io.micrometer*"
          - "io.prometheus*"
          - "io.zipkin.brave*"
        update-types: ["patch", "minor"]

      tooling:
        # Tests, build plugins, processors, utilities – catch-all
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  # ════════════════════════════════════════════════════════════════════════════
  # Docker – Weekly: patch + minor only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
      - "patch-minor"
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker:
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  # ════════════════════════════════════════════════════════════════════════════
  # GitHub Actions – Weekly: patch + minor only
  # ════════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
      - "patch-minor"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns:
          - "*"
        update-types: ["patch", "minor"]
